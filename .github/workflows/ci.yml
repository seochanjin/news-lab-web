name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feature/frontend-baseline

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_NEWSLAB_API_BASE_URL: https://api.newslab.ai.kr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
