apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-lab-web
  labels:
    app.kubernetes.io/name: news-lab-web
    app.kubernetes.io/part-of: newslab
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: news-lab-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: news-lab-web
        app.kubernetes.io/part-of: newslab
    spec:
      nodeSelector:
        workload: app
      containers:
        - name: news-lab-web
          image: seocj/news-lab-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_NEWSLAB_API_BASE_URL
              value: https://api.dev-scj.site
            - name: HOSTNAME
              value: 0.0.0.0
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
