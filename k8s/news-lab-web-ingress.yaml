apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: news-lab-web-ingress
  labels:
    app.kubernetes.io/name: news-lab-web
    app.kubernetes.io/part-of: newslab
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - newslab.ai.kr
        - www.newslab.ai.kr
      secretName: news-lab-web-tls
  rules:
    - host: newslab.ai.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: news-lab-web
                port:
                  number: 80
    - host: www.newslab.ai.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: news-lab-web
                port:
                  number: 80
